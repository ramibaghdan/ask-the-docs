# Evaluation question set for the FastAPI tutorial docs.
# Each entry:
#   question: what to ask the system
#   expect_source_contains: a substring expected in the source_file of a correctly
#                           retrieved chunk (drives the retrieval hit-rate metric)
#
# These target files that exist in data/docs/. expect_source_contains is matched as a
# substring of the source filename, so values are chosen to be specific enough to point
# at the right page.

